# Carbonio Core system users and groups
# See sysusers.d(5) for format

u syslog - "syslog user" - -
m syslog adm
g zextras -
u zextras - "zextras user" /opt/zextras /bin/bash
# Allow zextras to read /var/log/carbonio.log (owned by syslog:adm, mode 0640)
# so zmdailyreport, zmmsgtrace and similar tools work without exposing the
# mail log to every local user on the box.
m zextras adm
